<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="index.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="card">

        <div class="cover">
            <button class="add-btn">+</button>
        </div>

        <div class="profile-img">
            <img src="https://images.icc-cricket.com/image/upload/t_player-headshot-portrait-lg-webp/prd/assets/players/8322/3852.png" alt="Profile">
        </div>

        <div class="content">
            <h2>Rohit sharma</h2>
            <p>
                India's most successful opening batsmen<br>
                hold a record of highest individual score.
                
            </p>

            <div class="stats">
                <div>
                    <h3>72.9K</h3>
                    <span>Likes</span>
                </div>

                <div>
                    <h3>828</h3>
                    <span>Posts</span>
                </div>

                <div>
                    <h3>342.9K</h3>
                    <span>Views</span>
                </div>
            </div>

            <div class="social-icons">
                <i class="fa-brands fa-instagram"></i>
                <i class="fa-brands fa-x-twitter"></i>
                <i class="fa-brands fa-threads"></i>
            </div>
        </div>

    </div>

</body>
</html>
